name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "22"

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build application
        run: wails build -clean -nsis

      - name: Rename installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $installer = Get-ChildItem "build/bin/*-amd64-installer.exe" | Select-Object -First 1
          if ($installer) {
            $newName = "ClinmitraDental-$version-Setup.exe"
            Rename-Item $installer.FullName $newName
            Move-Item "build/bin/$newName" "build/bin/$newName" -ErrorAction SilentlyContinue
          }

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ClinMitra Dental v${{ steps.version.outputs.VERSION }}"
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.CHANGELOG }}

            ---

            ### Installation

            1. Download `ClinmitraDental-${{ steps.version.outputs.VERSION }}-Setup.exe`
            2. Run the installer (Windows may show SmartScreen warning — click "More info" → "Run anyway")
            3. Follow the setup wizard

            ### Upgrading

            If you have a previous version installed, the installer will update it automatically.
          files: |
            build/bin/*.exe
          draft: false
          prerelease: false
